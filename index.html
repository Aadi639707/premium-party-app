<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura | Elite Voice Rooms</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS (Static Setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a26' },
                        gold: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' },
                        neon: { 500: '#00f0ff' }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
</head>
<body class="bg-black text-gray-100 h-screen w-screen overflow-hidden antialiased flex justify-center selection:bg-gold-500 selection:text-black">

    <!-- Mobile App Container -->
    <main class="relative w-full h-full max-w-md bg-dark-900 shadow-2xl flex flex-col overflow-hidden border-x border-white/5">
        
        <!-- 1. AUTHENTICATION MODULE -->
        <section id="view-auth" class="absolute inset-0 z-50 flex flex-col justify-center p-8 bg-dark-900 transition-opacity duration-500 glass-bg">
            <div class="text-center mb-12">
                <div class="inline-block p-4 rounded-full bg-dark-800 border border-gold-500/30 shadow-[0_0_30px_rgba(250,204,21,0.2)] mb-6">
                    <i class="fa-solid fa-crown text-5xl text-gold-400"></i>
                </div>
                <h1 class="text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gold-300 via-gold-500 to-yellow-600 drop-shadow-lg">
                    AURA
                </h1>
                <p class="text-gold-500/70 text-xs mt-3 tracking-[0.3em] uppercase font-semibold">The Elite Network</p>
            </div>
            
            <form id="auth-form" class="flex flex-col gap-5 relative z-10">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="auth-email" placeholder="Email Address" required
                        class="w-full bg-dark-800/80 text-white pl-12 pr-5 py-4 rounded-2xl border border-white/5 focus:border-gold-500/50 outline-none transition-all focus:shadow-[0_0_15px_rgba(250,204,21,0.1)]">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="auth-password" placeholder="Password" required
                        class="w-full bg-dark-800/80 text-white pl-12 pr-5 py-4 rounded-2xl border border-white/5 focus:border-gold-500/50 outline-none transition-all focus:shadow-[0_0_15px_rgba(250,204,21,0.1)]">
                </div>
                <button type="submit" id="auth-btn" class="mt-4 bg-gradient-to-r from-gold-600 to-gold-400 text-black font-extrabold text-lg py-4 rounded-2xl shadow-[0_10px_30px_rgba(250,204,21,0.3)] hover:shadow-[0_10px_40px_rgba(250,204,21,0.5)] active:scale-[0.98] transition-all">
                    Enter Club
                </button>
                <p class="text-center text-sm text-gray-400 mt-4 cursor-pointer" id="toggle-auth">
                    Apply for access? <span class="text-gold-400 font-bold hover:text-gold-300">Sign Up</span>
                </p>
            </form>
            
            <!-- Background Orbs -->
            <div class="absolute top-0 left-0 w-64 h-64 bg-gold-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 -translate-x-1/2 -translate-y-1/2"></div>
            <div class="absolute bottom-0 right-0 w-64 h-64 bg-neon-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-10 translate-x-1/3 translate-y-1/3"></div>
        </section>

        <!-- 2. MAIN DASHBOARD -->
        <section id="view-dashboard" class="hidden flex-col h-full w-full relative z-10">
            <!-- Header -->
            <header class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-dark-900/90 backdrop-blur-md z-20">
                <h2 id="header-title" class="text-2xl font-bold text-white tracking-wide">Discover</h2>
                <div class="flex items-center gap-2 bg-dark-800 px-4 py-2 rounded-full border border-gold-500/20 shadow-inner">
                    <i class="fa-solid fa-gem text-neon-500 text-sm drop-shadow-[0_0_5px_rgba(0,240,255,0.8)]"></i>
                    <span id="wallet-balance" class="text-sm font-bold text-white">0</span>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-6 pb-28">
                
                <!-- Rooms Tab -->
                <div id="tab-rooms" class="flex flex-col gap-5">
                    <!-- Rooms injected via JS -->
                </div>

                <!-- Profile Tab -->
                <div id="tab-profile" class="hidden flex-col items-center pt-8">
                    <div class="relative group cursor-pointer">
                        <img src="https://i.pravatar.cc/150?img=68" alt="VIP Avatar" class="w-32 h-32 rounded-full border-[4px] border-dark-900 ring-4 ring-gold-500 shadow-[0_0_30px_rgba(250,204,21,0.4)] object-cover">
                        <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-gradient-to-r from-gold-600 to-yellow-400 text-black text-xs font-black px-4 py-1.5 rounded-full whitespace-nowrap shadow-lg">
                            VIP TIER <span id="vip-level">1</span>
                        </div>
                    </div>
                    <h3 id="profile-email" class="text-2xl font-extrabold mt-8 text-white">...</h3>
                    <p class="text-gray-500 text-sm mt-1 font-mono">UID: <span id="profile-uid">...</span></p>
                    
                    <div class="flex gap-10 mt-10 w-full justify-center bg-dark-800/50 py-6 rounded-3xl border border-white/5">
                        <div class="text-center">
                            <p id="profile-followers" class="text-3xl font-black text-white">0</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Followers</p>
                        </div>
                        <div class="w-px bg-white/10"></div>
                        <div class="text-center">
                            <p id="profile-following" class="text-3xl font-black text-white">0</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Following</p>
                        </div>
                    </div>

                    <button id="logout-btn" class="mt-12 w-full py-4 border border-red-500/30 text-red-400 rounded-2xl hover:bg-red-500/10 hover:border-red-500 transition-all font-bold tracking-wide">
                        Disconnect Identity
                    </button>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <nav class="absolute bottom-0 w-full bg-dark-900/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center py-4 pb-8 z-20">
                <button class="nav-btn active flex flex-col items-center gap-1.5 text-gold-400 transition-all scale-110" data-target="tab-rooms">
                    <i class="fa-solid fa-compass text-xl drop-shadow-[0_0_8px_rgba(250,204,21,0.4)]"></i>
                    <span class="text-[9px] uppercase font-bold tracking-wider">Explore</span>
                </button>
                <button class="nav-btn flex flex-col items-center gap-1.5 text-gray-600 hover:text-gray-300 transition-all" data-target="tab-profile">
                    <i class="fa-solid fa-user-astronaut text-xl"></i>
                    <span class="text-[9px] uppercase font-bold tracking-wider">Profile</span>
                </button>
            </nav>
        </section>

        <!-- 3. ACTIVE VOICE ROOM OVERLAY -->
        <section id="view-active-room" class="hidden absolute inset-0 z-[60] bg-dark-900 flex flex-col transform translate-y-full transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1)">
            
            <!-- Room Header -->
            <div class="relative h-72 bg-gradient-to-b from-dark-800 to-dark-900 p-6 flex flex-col justify-between overflow-hidden">
                <!-- Abstract BG -->
                <div class="absolute inset-0 opacity-30 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] pointer-events-none"></div>
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-neon-500 rounded-full mix-blend-screen filter blur-[80px] opacity-20 pointer-events-none"></div>

                <div class="relative z-10 flex justify-between items-start pt-4">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="flex h-2 w-2 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-neon-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-neon-500"></span>
                            </span>
                            <span class="text-[10px] uppercase text-neon-500 font-bold tracking-widest">Live Audio</span>
                        </div>
                        <h2 id="active-room-title" class="text-3xl font-extrabold text-white leading-tight">The Boardroom</h2>
                    </div>
                    <button id="leave-room-btn" class="w-12 h-12 rounded-full bg-dark-800/80 backdrop-blur border border-white/10 flex justify-center items-center text-gray-400 hover:bg-white/5 hover:text-white transition-all shadow-lg">
                        <i class="fa-solid fa-chevron-down text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Voice Seats (Grid) -->
            <div class="flex-1 px-6 -mt-16 relative z-10">
                <div class="bg-dark-800/90 backdrop-blur-xl rounded-[2rem] p-6 border border-white/5 shadow-2xl grid grid-cols-4 gap-y-10 gap-x-4 place-items-center" id="voice-seats">
                    <!-- Seats dynamically managed via JS -->
                </div>
            </div>

            <!-- Room Toolbar -->
            <div class="p-6 pb-10 flex gap-4 items-center bg-dark-900 border-t border-white/5 relative z-10">
                <button id="mic-btn" class="w-14 h-14 rounded-full bg-dark-800 flex justify-center items-center text-white text-xl shadow-lg border border-white/5 transition-all">
                    <i class="fa-solid fa-microphone-slash text-gray-500"></i>
                </button>
                <div class="flex-1"></div>
                <button id="gift-btn" class="px-6 py-4 rounded-2xl bg-gradient-to-r from-neon-500 to-blue-600 text-white font-bold text-sm shadow-[0_10px_20px_rgba(0,240,255,0.2)] hover:shadow-[0_10px_30px_rgba(0,240,255,0.4)] active:scale-95 transition-all flex gap-3 items-center">
                    <i class="fa-solid fa-gem"></i> Send Gift (100)
                </button>
            </div>
        </section>
        
    </main>

    <!-- App Logic Injection -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
