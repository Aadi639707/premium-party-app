<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura | Premium Voice Rooms</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#14141f', 700: '#1f1f2e' },
                        gold: { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' },
                        neon: { 500: '#06b6d4' }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Agora Web SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
</head>
<body class="bg-dark-900 text-gray-100 h-screen w-screen overflow-hidden antialiased flex justify-center">

    <!-- Mobile App Container (Constrained width for premium feel) -->
    <main class="relative w-full h-full max-w-md bg-dark-800 shadow-2xl flex flex-col overflow-hidden border-x border-white/5">
        
        <!-- 1. AUTHENTICATION VIEW -->
        <section id="view-auth" class="absolute inset-0 z-50 flex flex-col justify-center p-8 bg-dark-900 transition-opacity duration-500">
            <div class="text-center mb-10">
                <i class="fa-solid fa-microphone-lines text-5xl text-gold-500 mb-4 neon-glow"></i>
                <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-gold-400 to-yellow-200">AURA</h1>
                <p class="text-gray-400 text-sm mt-2 tracking-widest uppercase">Elite Voice Rooms</p>
            </div>
            <form id="auth-form" class="flex flex-col gap-4">
                <input type="email" id="auth-email" placeholder="Email Address" required
                    class="bg-dark-700/50 text-white px-5 py-4 rounded-xl border border-white/10 focus:border-gold-500 outline-none transition-all">
                <input type="password" id="auth-password" placeholder="Password" required
                    class="bg-dark-700/50 text-white px-5 py-4 rounded-xl border border-white/10 focus:border-gold-500 outline-none transition-all">
                <button type="submit" id="auth-btn" class="mt-4 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-900 font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(250,204,21,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-transform">
                    Enter the Club
                </button>
                <p class="text-center text-xs text-gray-500 mt-4 cursor-pointer hover:text-gold-400 transition-colors" id="toggle-auth-mode">
                    New here? <span class="text-gold-500 font-bold">Apply for Access (Sign Up)</span>
                </p>
            </form>
        </section>

        <!-- 2. MAIN DASHBOARD -->
        <section id="view-dashboard" class="hidden flex-col h-full w-full">
            <!-- Header -->
            <header class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-dark-900/80 backdrop-blur-md z-10">
                <h2 id="header-title" class="text-xl font-bold text-white">Discover</h2>
                <div class="flex items-center gap-2 bg-dark-700 px-3 py-1 rounded-full border border-gold-500/30">
                    <i class="fa-solid fa-coins text-gold-400 text-sm"></i>
                    <span id="wallet-balance-top" class="text-sm font-bold text-gold-400">...</span>
                </div>
            </header>

            <!-- Scrollable Content Area -->
            <div id="tab-content" class="flex-1 overflow-y-auto custom-scrollbar p-6 pb-24">
                <!-- Rooms Tab -->
                <div id="tab-rooms" class="flex flex-col gap-4">
                    <!-- Dynamic Rooms Injected Here -->
                </div>

                <!-- DMs Tab -->
                <div id="tab-dms" class="hidden flex-col gap-3">
                    <!-- Dynamic DMs Injected Here -->
                </div>

                <!-- Profile Tab -->
                <div id="tab-profile" class="hidden flex-col items-center pt-8">
                    <div class="relative">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="w-28 h-28 rounded-full border-4 border-gold-500 shadow-[0_0_20px_rgba(250,204,21,0.3)]">
                        <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-gradient-to-r from-gold-600 to-gold-400 text-dark-900 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap">VIP LEVEL <span id="vip-level">1</span></span>
                    </div>
                    <h3 id="profile-email" class="text-2xl font-bold mt-6">...</h3>
                    <p class="text-gray-400 text-sm mt-1">ID: <span id="profile-uid" class="font-mono text-xs">...</span></p>
                    
                    <div class="flex gap-8 mt-8 w-full justify-center">
                        <div class="text-center">
                            <p id="profile-followers" class="text-2xl font-bold text-white">0</p>
                            <p class="text-xs text-gray-500 uppercase">Followers</p>
                        </div>
                        <div class="w-px bg-white/10"></div>
                        <div class="text-center">
                            <p id="profile-following" class="text-2xl font-bold text-white">0</p>
                            <p class="text-xs text-gray-500 uppercase">Following</p>
                        </div>
                    </div>

                    <button id="logout-btn" class="mt-12 w-full py-4 border border-red-500/50 text-red-400 rounded-xl hover:bg-red-500/10 transition-colors font-semibold">
                        Sign Out
                    </button>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <nav class="absolute bottom-0 w-full bg-dark-900 border-t border-white/5 flex justify-around items-center py-4 pb-6 z-10 px-2">
                <button class="nav-btn active flex flex-col items-center gap-1 text-gold-500 transition-colors" data-target="tab-rooms">
                    <i class="fa-solid fa-compass text-xl"></i>
                    <span class="text-[10px] uppercase font-bold">Explore</span>
                </button>
                <button class="nav-btn flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 transition-colors" data-target="tab-dms">
                    <i class="fa-solid fa-comment-dots text-xl"></i>
                    <span class="text-[10px] uppercase font-bold">Messages</span>
                </button>
                <button class="nav-btn flex flex-col items-center gap-1 text-gray-500 hover:text-gray-300 transition-colors" data-target="tab-profile">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[10px] uppercase font-bold">Profile</span>
                </button>
            </nav>
        </section>

        <!-- 3. ACTIVE VOICE ROOM OVERLAY -->
        <section id="view-active-room" class="hidden absolute inset-0 z-[60] bg-dark-900 flex flex-col transform translate-y-full transition-transform duration-300 ease-in-out">
            <div class="relative h-64 bg-gradient-to-b from-purple-900/40 to-dark-900 p-6 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="active-room-title" class="text-2xl font-bold text-white">Billionaire Boys Club</h2>
                        <p class="text-xs text-gray-400 mt-1"><i class="fa-solid fa-headphones text-gold-400 mr-1"></i> <span id="room-count">1</span> Listening</p>
                    </div>
                    <button id="leave-room-btn" class="w-10 h-10 rounded-full bg-dark-700/80 backdrop-blur border border-white/10 flex justify-center items-center text-white hover:bg-red-500/20 hover:text-red-400 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <!-- Voice Seats (8-Grid) -->
            <div class="flex-1 px-6 -mt-10">
                <div class="bg-dark-800 rounded-3xl p-6 border border-white/5 shadow-2xl grid grid-cols-4 gap-y-8 gap-x-4 place-items-center" id="voice-seats">
                    <!-- Seats dynamically managed by JS -->
                </div>
            </div>

            <!-- Room Toolbar -->
            <div class="p-6 pb-10 flex gap-4 items-center border-t border-white/5 bg-dark-900">
                <button id="mic-btn" class="w-14 h-14 rounded-full bg-dark-700 flex justify-center items-center text-white text-xl shadow-lg border border-white/5 transition-all">
                    <i class="fa-solid fa-microphone-slash text-gray-400"></i>
                </button>
                <div class="flex-1"></div>
                <button id="gift-btn" class="px-6 py-4 rounded-full bg-gradient-to-r from-pink-600 to-purple-600 text-white font-bold text-sm shadow-[0_0_15px_rgba(219,39,119,0.4)] hover:scale-105 transition-transform flex gap-2 items-center">
                    <i class="fa-solid fa-gift"></i> Send Gift (100)
                </button>
            </div>
        </section>
        
        <!-- Audio players injected by Agora -->
        <div id="remote-audio-container" class="hidden"></div>
    </main>

    <script type="module" src="./js/app.js"></script>
</body>
                      </html>
